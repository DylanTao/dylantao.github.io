schema_version: 1

metadata:
  title: Paper Constellation
  summary: Follow the research threads that connect the published work, then look ahead without turning work in progress into a publication claim.
  future_note: Larger question marks hint at nearer-term work. Smaller marks hold space for earlier-stage directions.
  inspiration:
    label: Royal Constellations
    creator: Nadieh Bremer / Visual Cinnamon
    url: https://royalconstellations.visualcinnamon.com/
    process_url: https://www.datasketch.es/project/royal-constellations
  shared_by:
    label: John Thompson
    url: https://jrthomp.com/

threads:
  design:
    label: Design
    summary: Make alternatives and useful dimensions easier to see and work with.
    position:
      x: 24
      anchor_y: 31
  evaluate:
    label: Evaluate
    summary: Use evidence from people, artifacts, and traces to sharpen the next question.
    position:
      x: 50
      anchor_y: 31
  situate:
    label: Situate
    summary: Fit representations and assistance to the physical or practical context.
    position:
      x: 76
      anchor_y: 31

