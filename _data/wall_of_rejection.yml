section:
  title: Wall of Rejection
  description: Badges for papers that did not land yet.

papers:
  - id: p5
    paper_label: P5
    title: "XXX: abcdefg"
    role: first-author
    outcomes:
      - venue: CHI
        year: 2026
        code: CHI26
        status: rejected
      - venue: UIST
        year: 2026
        code: UIST26
        status: rejected

badges:
  - id: chi26-nope
    title: CHI26 Rejection
    count: 1
    kind: venue-rejection
    venue: CHI
    year: 2026
    rarity: common
    icon: heart-crack
    linked_paper_id: p5
    short: CHI said no. Useful notes for the next draft.
    stage: R&R decision
    date: 2026-01-15
    date_label: Jan 15, 2026
    detail: CHI 2026 did not accept this paper. The reviews now guide the next draft.
  - id: uist26-nope
    title: UIST26 Rejection
    count: 1
    kind: venue-rejection
    venue: UIST
    year: 2026
    rarity: common
    icon: paper-plane-crash
    linked_paper_id: p5
    short: The prototype lived. The paper needs another round.
    stage: First review
    date: 2026-05-28
    date_label: May 28, 2026
    detail: The system was built and submitted. UIST said no, so the next version gets clearer.
  - id: double-nope
    title: Double Rejection
    count: 1
    kind: meta
    rarity: rare
    icon: crossed-reviewer-pens
    linked_paper_id: p5
    short: Two noes. Still moving.
    stage: Combo badge
    date: 2026-05-28
    date_label: May 28, 2026
    detail: CHI and UIST both said no. That means the next version gets simpler and stronger.

xp:
  label: Nerdy Spooder-Man XP
  kicker: Failure XP
  blurb: Failed submissions count here; accepted papers stay in the list.
  level: 2
  current: 24
  next_level: 30
  progress: 80
  source_note: Small joke metric for failed submissions.
  quote: "I am not the hero the world wants, I am not the hero the world needs, but I am the hero that the world gets."
  rules:
    - label: First-author rejection
      value: "+12 XP"
    - label: Co-first listed first
      value: "+11 XP"
    - label: Co-first listed second
      value: "+9 XP"
    - label: Co-first listed third
      value: "+8 XP"
    - label: Co-author rejection
      value: "+4 XP"
    - label: Accepted papers
      value: "0 XP here"
      note: Accepted work already appears in the publication list.
  levels:
    - level: 1
      xp: 0
    - level: 2
      xp: 15
    - level: 3
      xp: 30
    - level: 4
      xp: 50
    - level: 5
      xp: 75
    - level: 6
      xp: 105
    - level: 7
      xp: 140
    - level: 8
      xp: 180
  timeline:
    - date: 2021-12
      display_date: 2021
      axis_label: "2021"
      label: First paper in the record
      total: 0
      x: 0
      y: 64
    - date: 2026-01-15
      display_date: Jan 15
      axis_label: "Jan"
      label: CHI26 no
      total: 12
      x: 87
      y: 34
    - date: 2026-05-28
      display_date: May 28
      axis_label: "May"
      label: UIST26 no
      total: 24
      x: 100
      y: 4
  ledger:
    - label: CHI no
      value: 1
    - label: UIST no
      value: 1
    - label: 2x combo
      value: 1

