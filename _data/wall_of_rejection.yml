section:
  title: Wall of Rejection
  description: Selected badges for papers, grants, and fellowships that did not land yet.

views:
  - id: highlights
    label: Highlights
    icon: star
    aria_label: Show highlighted rejection badges
    groups:
      - id: highlights
        label: Curated shelf
        shelf: highlights
  - id: type
    label: By type
    icon: layer-group
    aria_label: Organize rejection badges by kind
    groups:
      - id: papers
        label: Papers
        shelf: type-paper
      - id: funding
        label: Funding
        shelf: type-funding
  - id: venue_funder
    label: Venue/funder
    icon: building-columns
    aria_label: Organize rejection badges by venue or funder
    groups:
      - id: chi
        label: CHI
        shelf: venue-chi
      - id: uist
        label: UIST
        shelf: venue-uist
      - id: microsoft_research
        label: Microsoft Research
        shelf: funder-microsoft-research

events:
  - id: chi26-paper-rejection
