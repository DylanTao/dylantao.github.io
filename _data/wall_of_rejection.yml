badges:
  - id: chi-rejection
    title: CHI Rejection
    count: 1
    kind: venue-rejection
    category: paper
    venue: CHI
    year: 2026
    rarity: common
    icon: heart-crack
    linked_paper_id: p5
    shelves:
      - highlights
      - type-paper
      - venue-chi
    short: CHI said no. Useful notes for the next draft.
    stage: R&R decision
    date: 2026-01-15
    date_label: Jan 15, 2026
    detail: CHI 2026 did not accept this paper. The reviews now guide the next draft.
  - id: uist-rejection
    title: UIST Rejection
    count: 1
    kind: venue-rejection
    category: paper
    venue: UIST
    year: 2026
    rarity: common
    icon: paper-plane-crash
    linked_paper_id: p5
    shelves:
      - highlights
      - type-paper
      - venue-uist
    short: The prototype lived. The paper needs another round.
    stage: First review
    date: 2026-05-28
    date_label: May 28, 2026
    detail: The system was built and submitted. UIST said no, so the next version gets clearer.
  - id: first-grant-rejection
    title: First Grant Rejection
    count: 1
    kind: grant-rejection
    category: grant
    funder: Microsoft Research
    rarity: uncommon
    icon: file-circle-xmark
    linked_opportunity_id: msr-future-work-cfp
    shelves:
      - highlights
      - type-funding
      - funder-microsoft-research
    short: MSR Future of Work said no. Proposal reps still count.
    stage: Grant/proposal decision
    date: 2026-06-15
    date_label: Jun 15, 2026
    detail: MSR AI and the New Future of Work CFP did not land after decisions were delayed to June 15, 2026. The attempt still counts as proposal practice and future-work clarity.
  - id: first-fellowship-rejection
    title: First Fellowship Rejection
    count: 1
    kind: fellowship-rejection
    category: fellowship
    funder: Microsoft Research
    rarity: uncommon
    icon: user-graduate
    linked_opportunity_id: msr-fellowship
    shelves:
      - highlights
      - type-funding
      - funder-microsoft-research
    short: First fellowship no. The record gets more honest.
    stage: Fellowship decision
    date: 2026-02-27
    date_label: Feb 27, 2026
    detail: The MSR Fellowship proposal notification did not land this round on February 27, 2026. The badge marks the first fellowship rejection without making every future no a new card.
  - id: double-nope
    title: Double Rejection
    count: 1
    kind: meta
    category: paper
    rarity: rare
    icon: crossed-reviewer-pens
    linked_paper_id: p5
    shelves:
      - highlights
      - type-paper
    short: Two noes. Still moving.
    stage: Combo badge
    date: 2026-05-28
    date_label: May 28, 2026
    detail: CHI and UIST both said no. That means the next version gets simpler and stronger.

xp:
  label: Nerdy Spooder-Man
  kicker: Failure XP
  blurb: Counting selected failures here, not collecting every no.
  level: 3
  current: 38
  next_level: 50
  progress: 76
  source_note: Small joke metric for failed submissions. Combo and milestone badges add 0 XP so the same rejection is not counted twice.
  quote: "I am not the hero the world wants, I am not the hero the world needs, but I am the hero that the world gets."
  rules:
    - label: First-author paper rejection
      value: "+12 XP"
    - label: Co-first listed first
      value: "+11 XP"
    - label: Co-first listed second
      value: "+10 XP"
    - label: Co-first listed third
      value: "+9 XP"
    - label: Co-author paper rejection
      value: "+4 XP"
    - label: Grant/proposal rejection
      value: "+7 XP"
    - label: Fellowship rejection
      value: "+7 XP"
    - label: Combo/milestone badges
      value: "0 XP"
      note: They celebrate patterns without double counting.
    - label: Accepted work
      value: "0 XP here"
      note: Accepted work already appears in the publication list.
  levels:
    - level: 1
      xp: 0
    - level: 2
      xp: 15
    - level: 3
      xp: 30
    - level: 4
      xp: 50
    - level: 5
      xp: 75
    - level: 6
      xp: 105
    - level: 7
      xp: 140
    - level: 8
      xp: 180
  timeline:
    - date: 2021-12
      display_date: 2021
      axis_label: "2021"
      label: First paper in the record
      total: 0
      x: 0
      y: 64
    - date: 2026-01-15
      display_date: Jan 15
      axis_label: "Jan"
      label: CHI no
      total: 12
      x: 72
      y: 45
    - date: 2026-02-27
      display_date: Feb 27
      axis_label: "Feb"
      label: MSR Fellowship no
      total: 19
      x: 80
      y: 34
    - date: 2026-05-28
      display_date: May 28
      axis_label: "May"
      label: UIST no
      total: 31
      x: 88
      y: 15
    - date: 2026-06-15
      display_date: Jun 15
      axis_label: "Jun"
      label: MSR Future of Work no
      total: 38
      x: 100
      y: 4
  ledger:
    - label: paper
      value: 2
    - label: grant
      value: 1
    - label: fellowship
      value: 1
  view_ledgers:
    highlights:
      - label: Paper no-no
        value: "2"
      - label: Funding no-no
        value: "2"
    type:
      - label: Papers
        value: "2 noes"
      - label: Funding
        value: "2 noes"
    venue_funder:
      - label: CHI
        value: "1 no"
      - label: UIST
        value: "1 no"
      - label: Microsoft Research
        value: "2 noes"

