section:
  kicker: Celebrating rejection
  title: Wall of Rejection
  description: Accepted work lives below. These are the rejection badges.

papers:
  - id: p5
    paper_label: P5
    title: "XXX: abcdefg"
    role: first-author
    outcomes:
      - venue: CHI
        year: 2026
        code: CHI26
        status: rejected
      - venue: UIST
        year: 2026
        code: UIST26
        status: rejected

badges:
  - id: chi26-nope
    title: CHI26 Rejection
    count: 1
    kind: venue-rejection
    venue: CHI
    year: 2026
    rarity: common
    icon: heart-crack
    linked_paper_id: p5
    short: Reviews composted.
    detail: Unlocked after one brave CHI 2026 submission attempt. The reviews became compost.
  - id: uist26-nope
    title: UIST26 Rejection
    count: 1
    kind: venue-rejection
    venue: UIST
    year: 2026
    rarity: common
    icon: paper-plane-crash
    linked_paper_id: p5
    short: Iteration unlocked.
    detail: Interactive system built. Acceptance not included, iteration included.
  - id: double-nope
    title: Double Rejection
    count: 1
    kind: meta
    rarity: rare
    icon: crossed-reviewer-pens
    linked_paper_id: p5
    short: Great failure, greater failure.
    detail: With great failure comes greater failure. Two doors closed; one plot twist earned.

xp:
  label: Nerdy Spooder-Man
  kicker: Failure XP
  blurb: Just a nerdy Spooder-Man collecting rejection XP, not a productivity dashboard.
  level: 2
  current: 240
  next_level: 300
  progress: 67
  source_note: Inspired by Sirui's local UIST26 meme reference and the Spooder-Man trailer reference.
  quote: "I am not the hero the world wants, I am not the hero the world needs, but I am the hero that the world gets."
  rules:
    - label: First-author rejection
      value: "+120 XP"
    - label: Co-first listed first
      value: "+110 XP"
    - label: Co-first listed second
      value: "+95 XP"
    - label: Co-first listed third
      value: "+80 XP"
    - label: Co-author rejection
      value: "+45 XP"
    - label: Accepted papers
      value: "0 XP here"
      note: Accepted work already appears in the publication list.

