prompts:
  - title: Badge shelf
    text: >-
      Make a compact badge shelf for an academic HCI portfolio. Keep it native
      to my site, readable in dark mode, and lightly silly. Use my accent colors
      and icons for rejection, revision, feedback, and recovery. Do not copy a
      commercial badge UI.
  - title: Hero scene
    text: >-
      Create a wide teaser image for a playful academic project called HCI
      Spooder-Man. Show goofy web-slinger researchers walking through a city
      with laptops, sticky notes, sketchbooks, and review comments. Make it warm,
      funny, and usable on a personal website.
  - title: Personal guide
    text: >-
      Rewrite this HCI Spooder-Man project page for my own academic identity.
      Keep the core structure: a real academic moment starts the joke, the
      serious portfolio stays usable, the Markdown prompt and asset ZIP make it
      remixable, Sirui Tao is credited as the OG HCI Spooder-Man, and the page
      invites readers to become a Spooder-Man and join the nerdy Spooder-Verse.
      Adapt the tone, colors, examples, and humor level to my field.

