  title: HCI Spooder-Man Across the Spooder-Verse
  kicker: Remixable website movement
  lede: >-
    A playful guide for showing the messy parts of research without hiding the
    real work. The portfolio stays useful; the rough parts become remixable.
  trailer_url: https://youtu.be/uKYV2qjYIS0?si=QmRJJf5yuv41UFDY
