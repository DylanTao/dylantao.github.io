prompts:
  - title: Website badge shelf
    text: >-
      Create a playful Steam-achievement-style badge shelf for an academic HCI
      portfolio. The badges should feel compact, dark-mode friendly, slightly
      ridiculous, and site-native. Use my website accent color, my research
      identity, and small icons that represent research failure, iteration,
      feedback, and creative recovery. Avoid copying any exact copyrighted UI.
  - title: HCI Spooder hero
    text: >-
      Create a wide cinematic teaser image for a playful academic project called
      HCI Spooder-Man. Show a small group of intentionally goofy web-slinger
      researchers walking together through a city, carrying laptops, sticky
      notes, sketchbooks, and review comments. Make it warm, comic, and remixable
      for a personal portfolio website, not a polished movie poster.
  - title: Personal remix guide
    text: >-
      Rewrite this website page idea for my own academic identity. Keep the core
      move: invite people to remix a playful website artifact, share local assets,
      include prompts, credit the original inspiration, and end by saying this is
      the creativity I want to scaffold for everyone. Adapt the tone, colors, and
      examples to my field.

