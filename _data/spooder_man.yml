    text: >-
      Rejection, confusing review, failed prototype, or round two.
  - title: Grab the spoody-suits.
    text: >-
      Open the Markdown prompt and asset ZIP; swap in your field and voice.
  - title: Join the verse.
    text: >-
      Credit the idea and invite the next remix.

agent_prompt: |
  # HCI Spooder-Man Website Remix Prompt

  You are helping me adapt Sirui Tao's HCI Spooder-Man idea to my own academic website.

  Goal:
  Make a playful academic page from one real story. Sirui's original version came from a double rejection, a Steam-style badge meme sent to labmates, and then a Spooder-Man meme remix. My version should use my own academic moment.

  Use the attached remix-kit assets as references or placeholders. Reuse them, crop them, or make new visuals that match my site. Keep my main website credible: papers, CV, contact, and project pages should stay easy to find.

  Please implement:

  1. A short origin story about one real academic moment, such as rejection, revision, messy fieldwork, prototype failure, reviewer feedback, or creative recovery.
  2. A playful visual section that feels like my own "Spooder-Man" turn.
  3. A clear download/remix path with a Markdown prompt and asset ZIP.
  4. A serious path back to my papers, CV, contact, or project evidence.
  5. A closing invitation to become a Spooder-Man and join the nerdy Spooder-Verse.

  Design guidance:

  - Keep navigation boring in the best way: clear, readable, and predictable.
  - Make the playful section feel like part of my site.
  - Tell the concrete story first; do not replace it with generic design philosophy.
  - Use compact UI, restrained spacing, accessible contrast, keyboard support, and dark-mode-friendly styling.
  - Avoid copying exact commercial badge, game, or platform UI. Use the idea, not the exact interface.
  - If generating new assets, adapt colors, academic identity, institution, research materials, and visual tone to my site.

  Credits and closing:

  - Credit Sirui Tao as the OG HCI Spooder-Man.
  - Mention that the inspiration comes from the Spooder-Man trailers and playlist.
  - End with a version of: "Become a Spooder-Man. Join the nerdy Spooder-Verse."

