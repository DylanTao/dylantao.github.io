prompts:
  - title: Badge shelf
    text: >-
      Create a compact achievement-badge shelf for an academic HCI portfolio.
      Make it feel site-native, dark-mode friendly, and lightly ridiculous. Use
      my website accent colors, my research identity, and icons for rejection,
      iteration, feedback, and recovery. Do not copy an exact commercial badge UI.
  - title: Hero scene
    text: >-
      Create a wide cinematic teaser image for a playful academic project called
      HCI Spooder-Man. Show a small group of intentionally goofy web-slinger
      researchers walking together through a city, carrying laptops, sticky
      notes, sketchbooks, and review comments. Make it warm, comic, and remixable
      for a personal portfolio website, not a polished movie poster.
  - title: Personal guide
    text: >-
      Rewrite this HCI Spooder-Man project page for my own academic identity.
      Keep the core structure: a serious portfolio stays usable, one playful
      artifact becomes remixable, local assets and prompts are shared, Sirui Tao
      is credited as the OG HCI Spooder-Man, and the closing line says this is
      the creativity I want to scaffold for everyone. Adapt the tone, colors,
      examples, and level of chaos to my field.

