  accents:
    morning: "#7fa8b8"
    noon: "#4f7892"
    afternoon: "#7897a6"
    evening: "#9bbccb"
  takeaways:
    - "Models predict physical scene dynamics."
    - "Human judgments anchor plausibility."

website-revamp:
  origin_line: "My old portfolio listed projects and papers, but visitors could not see what I study or where to start."
  evolution_line: "I reorganized the archive around my research questions, then kept the useful experiments as reusable site rules."
  icon: archive
  teaser_alt: Research-first portfolio homepage with a design-judgment headline, portrait, navigation, and thesis framing
  accents:
    morning: "#f0a27a"
    noon: "#e17845"
    afternoon: "#d49a7c"
    evening: "#ffb876"
  takeaways:
    - "Visitors can see the research thread without reconstructing it."
    - "Experiments that survived review become reusable site rules."

paper-constellation:
  origin_line: "A year-by-year paper list hid the questions that recur across projects."
  evolution_line: "I mapped three recurring research questions on desktop; mobile follows the same papers through time instead of shrinking the map."
  icon: constellation
  teaser_alt: Paper Constellation preview showing accepted papers and anonymous future nodes across the Design, Evaluate, and Situate research threads
  # Literal crop from the 390x1000 light runtime capture on 2026-07-16.
  mobile_teaser: /assets/img/project_pics/paper-constellation/paper-constellation-mobile-trail-390-light-2026-07-16.png
  takeaways:
    - "Readers can follow one research question across papers instead of reading the bibliography year by year."
    - "Mobile follows time instead of shrinking the desktop map."

build-rhythm:
  origin_line: "The logs had totals, but they did not show when the work arrived in bursts."
  evolution_line: "A later dashboard mixed unlike numbers. I split it into weekly code changes, daily site-build estimates, and one dated lifetime total."
  icon: pulse
  teaser_alt: Two stacked Build Rhythm charts showing cumulative estimated site-build tokens and rounded daily increases
  accents:
    morning: "#e88754"
    noon: "#4f91ab"
    afternoon: "#5f8f93"
    evening: "#91c9dd"
  takeaways:
    - "Readers can see when work clustered without mistaking GitHub activity, site-build estimates, and lifetime usage for one metric."
    - "The charts show when work arrived, not whether it was good."

homepage-desk-scene:
  origin_line: "The flat desk held papers, records, and hidden cards, but visitors could not step inside the room."
  evolution_line: "I made 2D and 3D views of the same room, so music and discoveries remain when someone switches views."
  icon: desk
  teaser_alt: Research portfolio homepage with its interactive three-dimensional cliff-room desk beside the introduction
  accents:
    morning: "#e8a06f"
    noon: "#5996a7"
    afternoon: "#87a9a3"
    evening: "#9bc4cd"
  takeaways:
    - "Visitors can skim the research in 2D, explore the room in 3D, and switch without losing their music or discoveries."
    - "Inside and outside share one room."

scholar-lens:
  origin_line: "A highlighter suggestion made me notice that each paper's bibliography row, citation count, and yearly bars were far apart."
  evolution_line: "Selecting DesignWeaver now highlights its bibliography row, lifetime citation chip, and yearly bars together."
  icon: citation
  mobile_teaser: /assets/img/project_pics/scholar-lens/scholar-lens-designweaver-497b22266-390-light.png
  teaser_alt: "DesignWeaver highlighted in Scholar Lens's responsive publication and citation view"
  accents:
    morning: "#d99b6b"
    noon: "#648eab"
    afternoon: "#7792aa"
    evening: "#a9c4d4"
  takeaways:
    - "Readers can follow one paper from bibliography entry to citation history without hunting across the page."
    - "Every citation snapshot keeps its date visible."

wall-of-rejection:
  origin_line: "Two conference rejections became a lab meme worth keeping instead of hiding."
  evolution_line: "The meme became a wall where each rejection gets one dated badge and receipt, without being counted twice in the combo."
  icon: receipt
  teaser_alt: Wall of Rejection with a selected rejection receipt, event badges, and a Failure XP total that counts each rejection once
  accents:
    morning: "#dc6a5d"
    noon: "#4f80a5"
    afternoon: "#c47e70"
    evening: "#b7cee0"
  takeaways:
    - "Visitors can see the rejected attempts around accepted work and open the dated receipt behind each badge."
    - "Failure stays visible beside the work."

ikea-project-cards:
  origin_line: "I wanted project previews to open inside the grid so visitors could keep seeing the other projects and return to the same card."
  evolution_line: "The first transition scaled the whole card and squeezed its content. The current version moves the card without scaling its contents and cancels cleanly when another card opens."
  icon: expand
  teaser_alt: Expanded Paper Constellation project card opening in place while neighboring project cards remain visible
  accents:
    morning: "#e9a65f"
    noon: "#4f91b0"
    afternoon: "#7fa6ad"
    evening: "#a9c9d9"
  takeaways:
    - "Visitors can sample a project and return to the same place in the collection without a navigation detour."
    - "The card expands without losing its place in the grid."

dogtor-portal:
  origin_line: "A meme dog in the blog became a small clue for readers curious enough to follow it."
  evolution_line: "The clue became a short fruit-choice game with an obvious way back and a consent step before precise location."
  icon: paw
  teaser_alt: Illustrated corgi giving a suspicious, playful sideways glance
  accents:
    morning: "#e99c62"
    noon: "#62a77d"
    afternoon: "#79a187"
    evening: "#acceb8"
  takeaways:
    - "The clue is optional, and the way back stays obvious."
    - "Precise location appears only after consent."

not-a-good-driver:
  origin_line: "I wanted three people to share one VR joke: one steers badly, one rides along, and one watches from outside."
  icon: wheel
  teaser_alt: Low-poly driving scene with drivers on a winding suspended road while spectators watch from a cliff
  accents:
    morning: "#df725d"
    noon: "#6b9ccc"
    afternoon: "#a08fae"
    evening: "#b8d4e8"
  takeaways:
    - "Driver, passenger, and spectator get different parts of the same joke."
    - "The goal is shared performance, not driving mastery."

hci-spooder-man:
  origin_line: "The same paper was rejected by CHI and UIST, then became a Steam-style image passed around the lab."
  evolution_line: "A one-off Steam-style meme grew into a small remix kit, with the serious rejection record still one link away."
  icon: spooder
  teaser_alt: HCI Spooder-Man remix artwork from the project's downloadable character, scene, and title-card set
  accents:
    morning: "#d7675b"
    noon: "#2f75a8"
    afternoon: "#d9a15f"
    evening: "#d7e3ed"
  teasers:
    - /assets/img/project_pics/hci-spooder-man/hci-spooder-man-teaser.png
    - /assets/img/project_pics/hci-spooder-man/spooder-crosswalk-soft.png
    - /assets/img/project_pics/hci-spooder-man/spooder-rooftop-lineup.png
    - /assets/img/project_pics/hci-spooder-man/spooder-alley-car-scramble.png
    - /assets/img/project_pics/hci-spooder-man/spooder-jet-chaos.png
    - /assets/img/project_pics/hci-spooder-man/spooder-alley-standoff.png
    - /assets/img/project_pics/hci-spooder-man/spooder-closeup-dialogue.png
    - /assets/img/project_pics/hci-spooder-man/spooder-verse-title.png
    - /assets/img/project_pics/hci-spooder-man/spooder-man-title.png
  takeaways:
    - "The page gives people images and prompts they can actually remix."
    - "The serious rejection record stays one click away from the joke."

