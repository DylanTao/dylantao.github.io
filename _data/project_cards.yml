openai-build-week:
  origin_line: "Most of the portfolio existed before Build Week. I needed to show exactly what changed during the event."
  evolution_line: "I marked the cutoff on the timeline, then linked each change to the page and commit where it appears."
  icon: archive
  teaser_alt: Timeline separating the pre-existing Scaffolding for Taste portfolio from four post-cutoff OpenAI Build Week evidence chapters
  accents:
    morning: "#e88754"
    noon: "#4f91ab"
    afternoon: "#ef9b5c"
    evening: "#91c9dd"
  takeaways:
    - "Students can inspect which changes survived review and reuse the same screenshot checks on their own pages."
    - "Every claimed change links to evidence."

