name: Visual checkpoints

on:
  pull_request:
    branches: [main, master, v1.0-dev]
    paths:
      - "_config.yml"
      - "_data/**"
      - "_bibliography/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "_sass/**"
      - ".agents/skills/**"
      - ".codex/skills/**"
      - "assets/**"
      - "docs/**"
      - "test/visual/**"
      - ".github/workflows/visual-regression.yml"
      - "AGENTS.md"
      - "WEBSITE_DESIGN_HEURISTICS.md"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
  push:
    branches: [main, v1.0-dev]
    paths:
      - "_config.yml"
      - "_data/**"
      - "_bibliography/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "_sass/**"
      - ".agents/skills/**"
      - ".codex/skills/**"
      - "assets/**"
      - "docs/**"
      - "test/visual/**"
      - ".github/workflows/visual-regression.yml"
      - "AGENTS.md"
      - "WEBSITE_DESIGN_HEURISTICS.md"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"

jobs:
  visual-checkpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Jekyll and image runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick python3-pip
          pip3 install --user jupyter nbconvert

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public route and desk-scene checkpoints
        env:
          NO_WEBSERVER: "1"
          VISUAL_BASE_URL: http://127.0.0.1:4000/al-folio
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          LOG_PATH=/tmp/jekyll-candidate.log
          bundle exec jekyll serve --host 127.0.0.1 --port 4000 --baseurl /al-folio --trace --no-watch >"$LOG_PATH" 2>&1 &
          CANDIDATE_PID=$!

          cleanup() {
            kill "$CANDIDATE_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=0
          for attempt in $(seq 1 300); do
            if curl -fsS http://127.0.0.1:4000/al-folio/ >/dev/null; then
              READY=1
              break
            fi

            if ! kill -0 "$CANDIDATE_PID" >/dev/null 2>&1; then
              echo "Jekyll server exited before becoming ready."
              cat "$LOG_PATH" || true
              exit 1
            fi

            if (( attempt % 15 == 0 )); then
              echo "Still waiting for Jekyll (attempt $attempt of 300). Recent log output:"
              tail -n 30 "$LOG_PATH" || true
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Timed out waiting for the Jekyll server (10 minutes)."
            cat "$LOG_PATH" || true
            exit 1
          fi

          echo "Jekyll is ready. Recent build output:"
          tail -n 80 "$LOG_PATH" || true
          npm run test:visual:public

          LEGACY_VISUAL_GREP='mobile navbar|navbar menu|home dropped|home opened|home 3D|navbar search|content reading aid'
          VISUAL_BASE_URL= npm run test:visual:legacy -- --reporter=line --grep "$LEGACY_VISUAL_GREP"

      - name: Upload Playwright screenshots and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-checkpoint-artifacts
          path: |
            playwright-report
            test-results/public-visual
            test-results/legacy-visual
          if-no-files-found: ignore

      - name: Upload Jekyll logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-visual-logs
          path: /tmp/jekyll-candidate.log
          if-no-files-found: ignore
