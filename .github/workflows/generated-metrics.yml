name: Generated metrics checks

on:
  push:
    branches: [main]
    paths:
      - "_data/agentic_usage.yml"
      - "_data/direct_usage_tracker.json"
      - "_data/github_activity.json"
      - "assets/data/codex-profile-usage.json"
      - ".github/workflows/generated-metrics.yml"
  pull_request:
    branches: [main]
    paths:
      - "_data/agentic_usage.yml"
      - "_data/direct_usage_tracker.json"
      - "_data/github_activity.json"
      - "assets/data/codex-profile-usage.json"
      - ".github/workflows/generated-metrics.yml"
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout generated data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install contract dependency
        run: python -m pip install pyyaml==6.0.3

      - name: Validate direct tracker and privacy contracts
        run: python -m unittest discover -s test -p 'test_*.py'

      - name: Validate generated diff whitespace
        run: git diff --check HEAD^ HEAD

      - name: Scan generated surfaces for credentials
        shell: bash
        run: |
          if git grep -nEi '(gh[pousr]_[A-Za-z0-9]{20,}|github_pat_|sk-(proj-)?[A-Za-z0-9_-]{20,}|access[_-]?token|refresh[_-]?token|account[_-]?id|authorization|bearer[[:space:]]+[A-Za-z0-9._-]{16,})' -- \
            _data/agentic_usage.yml \
            _data/direct_usage_tracker.json \
            _data/github_activity.json \
            assets/data/codex-profile-usage.json \
            docs/agentic-usage-ledger.md; then
            echo "Generated metrics contain a forbidden credential-shaped field." >&2
            exit 1
          fi

      - name: Enforce personal-only generated surfaces
        shell: bash
        run: |
          if git grep -niE '(autodesk|github\.autodesk|git\.autodesk)' -- \
            _data/agentic_usage.yml \
            _data/direct_usage_tracker.json \
            _data/github_activity.json \
            assets/data/codex-profile-usage.json; then
            echo "Generated metrics contain a forbidden work boundary." >&2
            exit 1
          fi
