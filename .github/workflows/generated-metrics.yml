name: Generated metrics checks

on:
  push:
    branches: [main]
    paths:
      - "_data/agentic_usage.yml"
      - "_data/codex_account_history.json"
      - "_data/github_activity.json"
      - "assets/data/codex-profile-usage.json"
      - ".github/workflows/generated-metrics.yml"
  pull_request:
    branches: [main]
    paths:
      - "_data/agentic_usage.yml"
      - "_data/codex_account_history.json"
      - "_data/github_activity.json"
      - "assets/data/codex-profile-usage.json"
      - ".github/workflows/generated-metrics.yml"
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout generated data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install contract dependency
        run: python -m pip install pyyaml

      - name: Validate account, history, and privacy contracts
        run: >-
          python -m unittest
          test.test_refresh_codex_account
          test.test_github_activity_privacy

      - name: Scan generated surfaces for credentials
        shell: bash
        run: |
          if git grep -nEi '(ghp_[A-Za-z0-9]{20,}|github_pat_|sk-[A-Za-z0-9]{20,}|access[_-]?token|refresh[_-]?token|account[_-]?id)' -- \
            _data/agentic_usage.yml \
            _data/codex_account_history.json \
            _data/github_activity.json \
            assets/data/codex-profile-usage.json; then
            echo "Generated metrics contain a forbidden credential-shaped field." >&2
            exit 1
          fi
