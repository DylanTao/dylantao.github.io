name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 0 * * 1" # Monday
    - cron: "0 0 * * 3" # Wednesday
    - cron: "0 0 * * 5" # Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # See docs/CUSTOMIZE.md for details on how to set up PAT for triggering subsequent workflows
      #        with:
      #          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save current Scholar data hash
        id: before
        shell: bash
        run: |
          echo "Checking existing Scholar data hash..."
          files=()
          [ -f _data/citations.yml ] && files+=(_data/citations.yml)
          [ -f _data/publication_lens.yml ] && files+=(_data/publication_lens.yml)
          if (( ${#files[@]} > 0 )); then
            sha_before=$(sha256sum "${files[@]}" | sha256sum | awk '{print $1}')
            echo "sha_before=$sha_before" >> $GITHUB_OUTPUT
            echo "SHA before: $sha_before"
          else
            echo "sha_before=none" >> $GITHUB_OUTPUT
            echo "No existing Scholar data files found."
          fi

      - name: Run citation update script
        id: update
        shell: bash
        run: |
          echo "Running citation update script (single attempt)..."
          start_time=$(date)
          set +e
          timeout 180 python -u bin/update_scholar_citations.py
          status=$?
          set -e
          end_time=$(date)
          if [ $status -eq 0 ]; then
            echo "citation_result=success" >> $GITHUB_OUTPUT
            echo "Citation update succeeded (started at $start_time, ended at $end_time)."
            echo "Citation update succeeded." >> $GITHUB_STEP_SUMMARY
          elif [ $status -eq 124 ]; then
            echo "citation_result=stale" >> $GITHUB_OUTPUT
            echo "::warning::Google Scholar citation update timed out after 180 seconds; keeping existing citation data."
            echo "Citation update timed out after 180 seconds (started at $start_time, ended at $end_time)." >> $GITHUB_STEP_SUMMARY
            echo "Keeping existing citation data and skipping the citation-data commit." >> $GITHUB_STEP_SUMMARY
            git restore --worktree -- _data/citations.yml _data/publication_lens.yml
            find _data -maxdepth 1 \( -name '.citations.yml.*.tmp' -o -name '.publication_lens.yml.*.tmp' \) -delete
          else
            echo "Citation update script failed with exit code $status (started at $start_time, ended at $end_time)."
            echo "Citation update script failed with exit code $status." >> $GITHUB_STEP_SUMMARY
            exit $status
          fi

      - name: Save new Scholar data hash
        id: after
        shell: bash
        run: |
          echo "Checking updated Scholar data hash..."
          files=()
          [ -f _data/citations.yml ] && files+=(_data/citations.yml)
          [ -f _data/publication_lens.yml ] && files+=(_data/publication_lens.yml)
          if (( ${#files[@]} > 0 )); then
            sha_after=$(sha256sum "${files[@]}" | sha256sum | awk '{print $1}')
            echo "sha_after=$sha_after" >> $GITHUB_OUTPUT
            echo "SHA after: $sha_after"
          else
            echo "sha_after=none" >> $GITHUB_OUTPUT
            echo "Scholar data files were not created or are missing."
          fi

      - name: Report Scholar data change in summary
        run: |
          echo "Comparing Scholar data file hashes..."
          if [ "${{ steps.before.outputs.sha_before }}" != "${{ steps.after.outputs.sha_after }}" ]; then
            echo "Scholar data files were updated."
            echo "Scholar data files were updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "Scholar data files were not changed."
            echo "Scholar data files were not changed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure Git
        if: steps.update.outputs.citation_result == 'success'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          echo "Git configured."

      - name: Commit and push if changed
        if: steps.update.outputs.citation_result == 'success'
        run: |
          git add _data/citations.yml _data/publication_lens.yml
          git diff --staged --quiet || (
            echo "Committing and pushing changes..."
            git commit -m "Update Google Scholar citations"
            git push
          )
