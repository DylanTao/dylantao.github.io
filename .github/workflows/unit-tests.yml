name: Integration tests

on:
  push:
    branches:
      - master
      - main
      - v1.0-dev
    paths:
      - ".al-folio-overrides.yml"
      - ".codex/**"
      - ".github/agents/**"
      - ".github/copilot-instructions.md"
      - "Gemfile"
      - "Gemfile.lock"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "WEBSITE_DESIGN_HEURISTICS.md"
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "_sass/**"
      - "assets/**"
      - "bin/**"
      - "docs/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches:
      - master
      - main
      - v1.0-dev
    paths:
      - ".al-folio-overrides.yml"
      - ".codex/**"
      - ".github/agents/**"
      - ".github/copilot-instructions.md"
      - "Gemfile"
      - "Gemfile.lock"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "WEBSITE_DESIGN_HEURISTICS.md"
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "_sass/**"
      - "assets/**"
      - "bin/**"
      - "docs/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"

jobs:
  comments-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps 📦
        run: npm ci

      - name: Run style contract lint 🧷
        run: npm run lint:style-contract

      - name: Run Python policy and agent guidance tests
        run: python -m unittest discover -s test -p "test_*.py"

      - name: Install build prerequisites 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert

      - name: Run comments integration test 🧪
        run: bash test/integration_comments.sh

      - name: Run analytics plugin toggle integration test 📈
        run: bash test/integration_plugin_toggles.sh al_analytics

      - name: Run image tools plugin toggle integration test 🖼️
        run: bash test/integration_plugin_toggles.sh al_img_tools

      - name: Run distill integration test 📄
        run: bash test/integration_distill.sh

      - name: Run bootstrap compatibility integration test 🧩
        run: bash test/integration_bootstrap_compat.sh

      - name: Run upgrade CLI integration test ⬆️
        run: bash test/integration_upgrade_cli.sh

      - name: Run CSS minify integration test 🎨
        run: bash test/integration_css_minify.sh
