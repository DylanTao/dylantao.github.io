<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Local Wall of Rejection Steam-style mockup reference</title>
  <desc id="desc">A local vector note preserving the supplied Steam-inspired rejection wall concept: compact rejection badges, CHI and UIST prep rows, and an XP panel for Sirui.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07131f" />
      <stop offset="1" stop-color="#102a3b" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#0e2232" />
      <stop offset="1" stop-color="#071420" />
    </linearGradient>
    <linearGradient id="chi" x1="0" x2="1">
      <stop offset="0" stop-color="#4a255f" />
      <stop offset="1" stop-color="#162843" />
    </linearGradient>
    <linearGradient id="uist" x1="0" x2="1">
      <stop offset="0" stop-color="#163a67" />
      <stop offset="1" stop-color="#0b2740" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000814" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect y="0" width="1280" height="68" fill="#06101a" opacity="0.95" />
  <text x="42" y="43" fill="#89a6be" font-family="Arial, Helvetica, sans-serif" font-size="18">Steam-ish local reference / Sirui rejection wall</text>
  <text x="472" y="43" fill="#2fa8ff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">SIRUI</text>

  <rect x="34" y="88" width="190" height="548" rx="6" fill="#071421" stroke="#1b3548" />
  <text x="54" y="130" fill="#b7cad8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">GAMES &amp; TOOLS</text>
  <text x="58" y="182" fill="#c8d8e3" font-family="Arial, Helvetica, sans-serif" font-size="17">CHI 2026 Prep</text>
  <text x="58" y="222" fill="#c8d8e3" font-family="Arial, Helvetica, sans-serif" font-size="17">UIST 2026 Prep</text>
  <text x="58" y="262" fill="#c8d8e3" font-family="Arial, Helvetica, sans-serif" font-size="17">Reviewer Response</text>
  <text x="58" y="302" fill="#c8d8e3" font-family="Arial, Helvetica, sans-serif" font-size="17">Rebuttal Simulator</text>
  <text x="58" y="342" fill="#c8d8e3" font-family="Arial, Helvetica, sans-serif" font-size="17">Demo Day Showdown</text>

  <circle cx="330" cy="167" r="76" fill="#d8e4ed" stroke="#79a7d3" stroke-width="4" />
  <circle cx="330" cy="157" r="42" fill="#222f3b" />
  <path d="M270 242c26-42 91-45 121 0" fill="#1d2a35" />
  <text x="450" y="147" fill="#e7f2fb" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Sirui</text>
  <text x="452" y="183" fill="#4da9ff" font-family="Arial, Helvetica, sans-serif" font-size="18">HCI Researcher / Human-Centered Everything</text>
  <text x="452" y="222" fill="#8aa3b4" font-family="Arial, Helvetica, sans-serif" font-size="17">"measure twice, run user study once"</text>

  <rect x="244" y="282" width="620" height="310" rx="8" fill="#071421" stroke="#183346" />
  <text x="264" y="316" fill="#b8cbd8" font-family="Arial, Helvetica, sans-serif" font-size="24">Recent Activity</text>
  <text x="672" y="316" fill="#7e98ab" font-family="Arial, Helvetica, sans-serif" font-size="18">113.7 hours past 2 weeks</text>

  <rect x="264" y="342" width="178" height="78" fill="url(#chi)" />
  <text x="290" y="383" fill="#f4eef8" font-family="Georgia, serif" font-size="30" font-weight="700">CHI</text>
  <text x="290" y="408" fill="#f4eef8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">2026 PREP</text>
  <text x="464" y="376" fill="#d8e5ef" font-family="Arial, Helvetica, sans-serif" font-size="19">CHI 2026 Prep</text>
  <rect x="620" y="390" width="150" height="8" rx="4" fill="#21394a" />
  <rect x="620" y="390" width="104" height="8" rx="4" fill="#845ed4" />

  <rect x="264" y="448" width="178" height="78" fill="url(#uist)" />
  <text x="288" y="488" fill="#eff6fb" font-family="Georgia, serif" font-size="30" font-weight="700">UIST</text>
  <text x="288" y="513" fill="#eff6fb" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">2026 PREP</text>
  <text x="464" y="482" fill="#d8e5ef" font-family="Arial, Helvetica, sans-serif" font-size="19">UIST 2026 Prep</text>
  <rect x="620" y="496" width="150" height="8" rx="4" fill="#21394a" />
  <rect x="620" y="496" width="82" height="8" rx="4" fill="#4066dd" />

  <rect x="896" y="276" width="280" height="174" rx="8" fill="#071421" stroke="#183346" />
  <text x="916" y="314" fill="#39bafa" font-family="Arial, Helvetica, sans-serif" font-size="24">Badges</text>
  <rect x="916" y="342" width="54" height="54" rx="5" fill="#182432" stroke="#91714c" stroke-width="2" />
  <text x="928" y="375" fill="#d8c39c" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">HCI</text>
  <rect x="988" y="342" width="54" height="54" rx="5" fill="#21183c" stroke="#6547a3" stroke-width="2" />
  <text x="1003" y="376" fill="#db83ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">26</text>
  <rect x="1060" y="342" width="54" height="54" rx="5" fill="#152438" stroke="#365a79" stroke-width="2" />
  <text x="1078" y="376" fill="#bfe7ff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">XP</text>

  <g filter="url(#softShadow)">
    <rect x="846" y="414" width="392" height="96" rx="10" fill="url(#panel)" stroke="#3d5062" />
    <rect x="864" y="428" width="74" height="68" rx="4" fill="#351915" stroke="#d36b4e" stroke-width="2" />
    <path d="M901 444c-17-18-43 7-15 31l15 15 15-15c28-24 2-49-15-31z" fill="#f0967f" />
    <path d="M901 443v46" stroke="#3a1613" stroke-width="5" />
    <text x="958" y="452" fill="#8ea4b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Achievement Unlocked</text>
    <text x="958" y="486" fill="#eef7ff" font-family="Arial, Helvetica, sans-serif" font-size="30">CHI26 Rejection x1</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="846" y="532" width="392" height="96" rx="10" fill="url(#panel)" stroke="#3d5062" />
    <rect x="864" y="546" width="74" height="68" rx="4" fill="#162332" stroke="#7892ad" stroke-width="2" />
    <path d="M901 562c-17-18-43 7-15 31l15 15 15-15c28-24 2-49-15-31z" fill="#b9d9f6" />
    <path d="M901 561v46" stroke="#132233" stroke-width="5" />
    <text x="958" y="570" fill="#8ea4b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Achievement Unlocked</text>
    <text x="958" y="604" fill="#eef7ff" font-family="Arial, Helvetica, sans-serif" font-size="30">UIST26 Rejection x1</text>
  </g>
</svg>
